app = 'invoiceque-rabbitmq'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[env]
  RABBITMQ_DEFAULT_USER = 'invoiceque'

[mounts]
  source = 'rabbitmq_data'
  destination = '/var/lib/rabbitmq'

[http_service]
  internal_port = 15672
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
