services:
  # ============================================================
  # API GATEWAY
  # ============================================================
  api-gateway:
    build:
      context: ./api_gateway
      dockerfile: Dockerfile
    container_name: invoiceque-gateway
    ports:
      - "8080:8080"
    environment:
      AUTH_SERVICE_URL: http://auth-service:8001
      CLIENT_SERVICE_URL: http://client-service:8002
      INVOICE_SERVICE_URL: http://invoice-service:8003
      PAYMENT_SERVICE_URL: http://payment-service:8004
      NOTIFICATION_SERVICE_URL: http://notification-service:8005
      SUBSCRIPTION_SERVICE_URL: http://subscription-service:8006
      JWT_SECRET: ${JWT_SECRET:-invoiceque-super-secret-key-change-in-production}
    depends_on:
      auth-service:
        condition: service_started
      client-service:
        condition: service_started
      invoice-service:
        condition: service_started
      payment-service:
        condition: service_started
      notification-service:
        condition: service_started
    networks:
      - invoiceque-net

  # ============================================================
  # SERVICES (using Neon Cloud PostgreSQL — Singapore)
  # ============================================================
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: invoiceque-auth
    ports:
      - "8001:8001"
    environment:
      DB_URL: ${AUTH_DB_URL}
      JWT_SECRET: ${JWT_SECRET:-invoiceque-super-secret-key-change-in-production}
      PORT: 8001
    networks:
      - invoiceque-net

  client-service:
    build:
      context: ./services/client-service
      dockerfile: Dockerfile
    container_name: invoiceque-client
    ports:
      - "8002:8002"
    environment:
      DB_URL: ${CLIENT_DB_URL}
      PORT: 8002
    networks:
      - invoiceque-net

  invoice-service:
    build:
      context: ./services/invoice-service
      dockerfile: Dockerfile
    container_name: invoiceque-invoice
    ports:
      - "8003:8003"
    environment:
      DB_URL: ${INVOICE_DB_URL}
      PAYMENT_SERVICE_URL: http://payment-service:8004
      NOTIFICATION_SERVICE_URL: http://notification-service:8005
      PORT: 8003
    networks:
      - invoiceque-net

  payment-service:
    build:
      context: ./services/payment-service
      dockerfile: Dockerfile
    container_name: invoiceque-payment
    ports:
      - "8004:8004"
    environment:
      DATABASE_URL: ${PAYMENT_DB_URL}
      NOTIFICATION_SERVICE_URL: http://notification-service:8005
      INVOICE_SERVICE_URL: http://invoice-service:8003
      XENDIT_API_KEY: ${XENDIT_API_KEY:-xnd_development_placeholder}
      XENDIT_CALLBACK_TOKEN: ${XENDIT_CALLBACK_TOKEN:-xendit-callback-token-placeholder}
      XENDIT_BASE_URL: ${XENDIT_BASE_URL:-https://api.xendit.co}
      PORT: 8004
    networks:
      - invoiceque-net

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: invoiceque-notification
    ports:
      - "8005:8005"
    environment:
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      FROM_EMAIL: ${FROM_EMAIL:-noreply@invoiceque.id}
      AUTH_SERVICE_URL: http://auth-service:8001
      PORT: 8005
    networks:
      - invoiceque-net

  subscription-service:
    build:
      context: ./services/subscription-service
      dockerfile: Dockerfile
    container_name: invoiceque-subscription
    ports:
      - "8006:8006"
    environment:
      DB_URL: ${SUBSCRIPTION_DB_URL}
      NOTIFICATION_SERVICE_URL: http://notification-service:8005
      PORT: 8006
    networks:
      - invoiceque-net

# ============================================================
# NETWORKS
# ============================================================
networks:
  invoiceque-net:
    driver: bridge
