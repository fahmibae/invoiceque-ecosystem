app = 'invoiceque-payment'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '8004'
  RABBITMQ_URL = 'amqp://invoiceque:${RABBITMQ_PASSWORD}@invoiceque-rabbitmq.internal:5672'

[http_service]
  internal_port = 8004
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
